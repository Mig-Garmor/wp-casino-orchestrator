services:
  db:
    image: mysql:8.0
    container_name: wp_casino_remote_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - remote_db_data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.3-apache
    container_name: wp_casino_remote_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${REMOTE_WORDPRESS_PORT:-80}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DEBUG: "0"
      WORDPRESS_CONFIG_EXTRA: |
        define('DISALLOW_FILE_EDIT', true);
        define('WP_DEBUG_LOG', false);
        define('WP_DEBUG_DISPLAY', false);
    volumes:
      - remote_wordpress_data:/var/www/html

      # Mounted Git repositories, read-only in remote
      - ./repos/wp-casino-theme:/var/www/html/wp-content/themes/wp-casino-theme:ro
      - ./repos/wp-casino-plugin:/var/www/html/wp-content/plugins/wp-casino-plugin:ro

      # Runtime uploads stay writable
      - remote_uploads_data:/var/www/html/wp-content/uploads

  wpcli:
    image: wordpress:cli
    container_name: wp_casino_remote_cli
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - remote_wordpress_data:/var/www/html
      - ./repos/wp-casino-theme:/var/www/html/wp-content/themes/wp-casino-theme:ro
      - ./repos/wp-casino-plugin:/var/www/html/wp-content/plugins/wp-casino-plugin:ro
      - remote_uploads_data:/var/www/html/wp-content/uploads
    working_dir: /var/www/html

volumes:
  remote_db_data:
  remote_wordpress_data:
  remote_uploads_data:
